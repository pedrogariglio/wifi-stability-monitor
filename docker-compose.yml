version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: wifi-backend
    ports:
      - "8088:8088"
    volumes:
      - /var/log/wifi-metrics.csv:/var/log/wifi-metrics.csv:ro
      - ./dashboard/main.py:/app/main.py
    env_file:
      - .env
    restart: unless-stopped

